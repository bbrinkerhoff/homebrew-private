# OculiX Dark — FlatLaf custom theme overrides (layered on top of FlatDarkLaf).
# Loaded automatically by OculixDarkLaf via FlatLaf.registerCustomDefaultsSource("themes").
#
# Patched by bbrinkerhoff/homebrew-private build process.
# Changes from upstream:
#   - ToolTip.border: fixed invalid 7-value format that aborted file loading in
#     UIDefaultsLoader; colour is now expressed via ToolTip.borderColor separately.
#   - ToggleButton.*: added so the DARK / LIGHT toggle in the footer renders correctly.
#   - CheckBox/RadioButton foreground: made explicit (wildcard *.foreground can miss
#     these when they live inside a non-Panel container in some FlatLaf versions).
#
# Tokens and their roles are documented in src/main/java/org/sikuli/ide/theme/OculixColors.java.

# ── Brand variables (referenced below as @oculix.<x>) ─────────────────
@oculix.cyan500 = #1EA5FF
@oculix.cyan300 = #7CCBFF
@oculix.violet500 = #8B5CF6
@oculix.violet300 = #B79DFA
@oculix.lime500 = #4FC72A
@oculix.lime400 = #7DE356
@oculix.lime300 = #A8EE8A
@oculix.red500 = #E53935
@oculix.amber500 = #FFC857
@oculix.ink900 = #05081A
@oculix.ink800 = #0A1028
@oculix.ink700 = #121A3A
@oculix.ink600 = #1C2753
@oculix.ink500 = #2B3A72
@oculix.ink400 = #4456A0
@oculix.ink300 = #7D8BC9
@oculix.ink200 = #B9C2E8
@oculix.ink100 = #E6EAFB

# ── FlatLaf base ──────────────────────────────────────────────────────
@base = @oculix.ink800
@accent = @oculix.cyan500
@background = @oculix.ink800
@foreground = @oculix.ink100
@disabledForeground = @oculix.ink400

# ── Buttons ───────────────────────────────────────────────────────────
Button.background = #ffffff10
Button.foreground = @oculix.ink100
Button.borderColor = @oculix.ink500
Button.focusedBorderColor = @oculix.cyan500
Button.hoverBackground = #ffffff18
Button.default.background = @oculix.cyan500
Button.default.foreground = #00131F
Button.default.hoverBackground = @oculix.cyan300
Button.default.focusedBorderColor = @oculix.cyan500

# ToggleButton (DARK / LIGHT footer switcher and toolbar toggles)
ToggleButton.background = #ffffff10
ToggleButton.foreground = @oculix.ink100
ToggleButton.borderColor = @oculix.ink500
ToggleButton.focusedBorderColor = @oculix.cyan500
ToggleButton.hoverBackground = #ffffff18
ToggleButton.selectedBackground = @oculix.ink600
ToggleButton.selectedForeground = @oculix.cyan500

# ── Checkboxes & radio buttons ────────────────────────────────────────
CheckBox.foreground = @oculix.ink100
CheckBox.icon.background = @oculix.ink900
CheckBox.icon.borderColor = @oculix.ink500
CheckBox.icon.selectedBackground = @oculix.cyan500
CheckBox.icon.selectedBorderColor = @oculix.cyan500
CheckBox.icon.checkmarkColor = #00131F
RadioButton.foreground = @oculix.ink100

# ── Text fields ───────────────────────────────────────────────────────
TextField.background = @oculix.ink900
TextField.foreground = @oculix.ink100
TextField.borderColor = @oculix.ink500
TextField.focusedBorderColor = @oculix.cyan500
TextField.selectionBackground = #1EA5FF40
TextField.selectionForeground = @oculix.ink100
TextField.caretForeground = @oculix.cyan500
FormattedTextField.selectionBackground = #1EA5FF40
FormattedTextField.selectionForeground = @oculix.ink100
FormattedTextField.caretForeground = @oculix.cyan500
PasswordField.selectionBackground = #1EA5FF40
PasswordField.selectionForeground = @oculix.ink100
PasswordField.caretForeground = @oculix.cyan500
PasswordField.capsLockIconColor = @oculix.amber500
TextArea.background = @oculix.ink900
TextArea.foreground = @oculix.ink100
TextArea.selectionBackground = #1EA5FF40
TextArea.selectionForeground = @oculix.ink100
TextArea.caretForeground = @oculix.cyan500
# TextPane / EditorPane: white background so OculiX's dark syntax colours
# render on a light surface (the engine was designed for dark text on light bg).
# The rest of the chrome stays dark; only the code editor pane is light.
TextPane.background = #FFFFFF
TextPane.foreground = @oculix.ink900
TextPane.selectionBackground = #B3D4FF
TextPane.selectionForeground = @oculix.ink900
TextPane.caretForeground = @oculix.cyan500
EditorPane.background = #FFFFFF
EditorPane.foreground = @oculix.ink900
EditorPane.selectionBackground = #B3D4FF
EditorPane.selectionForeground = @oculix.ink900
EditorPane.caretForeground = @oculix.cyan500
ComboBox.background = @oculix.ink900
ComboBox.foreground = @oculix.ink100
ComboBox.selectionBackground = @oculix.ink600
ComboBox.selectionForeground = @oculix.ink100
Spinner.background = @oculix.ink900
Spinner.foreground = @oculix.ink100
Spinner.selectionBackground = #1EA5FF40
Spinner.selectionForeground = @oculix.ink100

# ── Lists / trees / tables ────────────────────────────────────────────
List.background = @oculix.ink800
List.selectionBackground = @oculix.ink600
List.selectionForeground = @oculix.ink100
List.selectionInactiveBackground = @oculix.ink700
Tree.background = @oculix.ink800
Tree.selectionBackground = @oculix.ink600
Tree.selectionForeground = @oculix.ink100
Table.background = @oculix.ink800
Table.gridColor = #ffffff0A
Table.selectionBackground = @oculix.ink600
Table.selectionForeground = @oculix.ink100

# ── Tabs ──────────────────────────────────────────────────────────────
TabbedPane.background = @oculix.ink900
TabbedPane.selectedBackground = @oculix.ink800
TabbedPane.underlineColor = @oculix.cyan500
TabbedPane.disabledUnderlineColor = @oculix.ink400
TabbedPane.hoverColor = #ffffff10

# ── Menus ─────────────────────────────────────────────────────────────
MenuBar.background = @oculix.ink900
MenuBar.foreground = @oculix.ink100
Menu.selectionBackground = @oculix.ink600
Menu.selectionForeground = @oculix.ink100
MenuItem.selectionBackground = @oculix.ink600
MenuItem.selectionForeground = @oculix.ink100
RadioButtonMenuItem.selectionBackground = @oculix.ink600
RadioButtonMenuItem.selectionForeground = @oculix.ink100
CheckBoxMenuItem.selectionBackground = @oculix.ink600
CheckBoxMenuItem.selectionForeground = @oculix.ink100
MenuItem.acceleratorForeground = @oculix.ink300
PopupMenu.background = @oculix.ink700

# ── Scrollbars ────────────────────────────────────────────────────────
ScrollBar.thumb = #ffffff14
ScrollBar.hoverThumbColor = #ffffff28
ScrollBar.track = #00000000
ScrollBar.trackArc = 999
ScrollBar.thumbArc = 999

# ── Separators / borders / focus ──────────────────────────────────────
Separator.foreground = #ffffff0A
Component.borderColor = @oculix.ink500
Component.focusedBorderColor = @oculix.cyan500
Component.focusColor = @oculix.cyan500
Component.linkColor = @oculix.cyan300

# ── Tooltips ──────────────────────────────────────────────────────────
# FIX: upstream had "1,8,1,8,@oculix.ink500,1,3" — UIDefaultsLoader cannot
# parse a colour variable inside an insets tuple; this aborted the entire file.
ToolTip.background = @oculix.ink600
ToolTip.foreground = @oculix.ink100
ToolTip.border = 1,8,1,8
ToolTip.borderColor = @oculix.ink500

# ── Custom OculiX semantic keys (consumed by hand-painted components) ─
@oculix.run = @oculix.lime500
@oculix.running = @oculix.amber500
@oculix.error = @oculix.red500
@oculix.success = @oculix.lime400
