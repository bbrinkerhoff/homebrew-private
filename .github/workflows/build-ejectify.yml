name: Build Ejectify

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout tap
        uses: actions/checkout@v5

      - name: Get latest Ejectify tag
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api repos/nielsmouthaan/ejectify-macos/tags --jq '.[0].name')
          if [[ -z "$TAG" ]]; then
            echo "Failed to fetch upstream tag" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if already built
        id: check
        run: |
          CURRENT=$(grep 'version "' Casks/ejectify.rb | sed 's/.*version "\(.*\)"/\1/')
          if [[ "$CURRENT" == "${{ steps.upstream.outputs.version }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already at $CURRENT, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone Ejectify source
        if: steps.check.outputs.skip == 'false'
        run: |
          git clone https://github.com/nielsmouthaan/ejectify-macos.git
          cd ejectify-macos
          git checkout ${{ steps.upstream.outputs.tag }}

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: |
          xcodebuild \
            -project ejectify-macos/Ejectify.xcodeproj \
            -scheme Ejectify \
            -configuration Release \
            SYMROOT="$GITHUB_WORKSPACE/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Package
        if: steps.check.outputs.skip == 'false'
        run: |
          cd build/Release
          zip -r --symlinks "$GITHUB_WORKSPACE/Ejectify.zip" Ejectify.app
          cd "$GITHUB_WORKSPACE"
          echo "SHA256=$(shasum -a 256 Ejectify.zip | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Create release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="ejectify-${{ steps.upstream.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            Ejectify.zip \
            --title "Ejectify ${{ steps.upstream.outputs.version }}" \
            --notes "Built from [nielsmouthaan/ejectify-macos@${{ steps.upstream.outputs.tag }}](https://github.com/nielsmouthaan/ejectify-macos/tree/${{ steps.upstream.outputs.tag }})"

      - name: Update cask
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Casks/ejectify.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/ejectify.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ejectify.rb
          git commit -m "chore: update ejectify to $VERSION"
          git push
