name: Build SikuliX

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 2" # Every Tuesday at 9am UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout tap
        uses: actions/checkout@v5

      - name: Get latest SikuliX release
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(gh api repos/oculix-org/SikuliX1/releases/latest --jq '.tag_name | ltrimstr("v")')
          if [[ -z "${VERSION}" ]]; then
            echo "Failed to fetch latest SikuliX version" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=sikulix-${VERSION}" >> "$GITHUB_OUTPUT"
          echo "jar_url=https://github.com/oculix-org/SikuliX1/releases/download/v${VERSION}/sikulixide-${VERSION}-macos.jar" >> "$GITHUB_OUTPUT"

      - name: Check if already built
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.upstream.outputs.tag }}"
          # Manual triggers always rebuild; scheduled runs skip existing releases
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — rebuilding ${TAG} regardless."
            # Clean up any existing release + tag so we can recreate them
            if gh release view "${TAG}" &>/dev/null; then
              gh release delete "${TAG}" --yes
              git push origin ":refs/tags/${TAG}"
            fi
          elif gh release view "${TAG}" &>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already built ${TAG}, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 21
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download SikuliX JAR
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          readonly VERSION="${{ steps.upstream.outputs.version }}"
          readonly JAR_URL="${{ steps.upstream.outputs.jar_url }}"
          readonly JAR_NAME="sikulixide-${VERSION}-macos.jar"
          curl -fsSL "${JAR_URL}" -o "${JAR_NAME}"
          echo "JAR_NAME=${JAR_NAME}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build app icon
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          readonly ICON_URL="https://raw.githubusercontent.com/oculix-org/SikuliX1/master/IDE/src/main/resources/icons/sikulix-icon.png"
          curl -fsSL "${ICON_URL}" -o icon_src.png

          # Build iconset at all required resolutions
          mkdir -p AppIcon.iconset
          for size in 16 32 128 256 512; do
            sips -z "${size}" "${size}" icon_src.png \
              --out "AppIcon.iconset/icon_${size}x${size}.png" >/dev/null
            sips -z "$((size * 2))" "$((size * 2))" icon_src.png \
              --out "AppIcon.iconset/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns AppIcon.iconset -o AppIcon.icns

      - name: Assemble app bundle
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          readonly VERSION="${VERSION}"
          readonly APP_DIR="SikuliX.app/Contents"

          mkdir -p "${APP_DIR}/MacOS"
          mkdir -p "${APP_DIR}/Resources"

          # Compiled Mach-O launcher — shell scripts lose the macOS bundle
          # association when they exec Java, causing a duplicate dock entry.
          # A compiled binary maintains the PID-to-bundle mapping through
          # execv() so Java inherits the bundle's dock slot.
          cat > /tmp/sikulix_launcher.c << 'C'
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <libgen.h>
#include <mach-o/dyld.h>

int main(int argc, char *argv[]) {
    char execPath[4096];
    uint32_t size = sizeof(execPath);
    if (_NSGetExecutablePath(execPath, &size) != 0) {
        fprintf(stderr, "SikuliX: could not resolve executable path\n");
        return 1;
    }

    char *dir = dirname(execPath);
    char jarPath[4096], iconPath[4096], dockIcon[4096];
    snprintf(jarPath,  sizeof(jarPath),  "%s/../Resources/sikulixide.jar", dir);
    snprintf(iconPath, sizeof(iconPath), "%s/../Resources/AppIcon.icns",   dir);
    snprintf(dockIcon, sizeof(dockIcon), "-Xdock:icon=%s", iconPath);

    const char *java = "/opt/homebrew/opt/openjdk@21/bin/java";
    if (access(java, X_OK) != 0) {
        fprintf(stderr, "SikuliX: Java 21 not found at %s\n"
                        "Install it with: brew install openjdk@21\n", java);
        return 1;
    }

    int fixed = 7;
    char **args = malloc((fixed + argc) * sizeof(char *));
    args[0] = (char *)java;
    args[1] = "-Dapple.awt.application.name=SikuliX";
    args[2] = "-Xdock:name=SikuliX";
    args[3] = dockIcon;
    args[4] = "-Dapple.laf.useScreenMenuBar=true";
    args[5] = "-jar";
    args[6] = jarPath;
    for (int i = 1; i < argc; i++) args[fixed - 1 + i] = argv[i];
    args[fixed - 1 + argc] = NULL;

    execv(java, args);
    fprintf(stderr, "SikuliX: execv failed\n");
    return 1;
}
C
          clang -o "${APP_DIR}/MacOS/SikuliX" /tmp/sikulix_launcher.c
          chmod +x "${APP_DIR}/MacOS/SikuliX"

          # Resources
          cp "${JAR_NAME}" "${APP_DIR}/Resources/sikulixide.jar"
          cp AppIcon.icns   "${APP_DIR}/Resources/AppIcon.icns"

          # PkgInfo
          printf 'APPL????' > "${APP_DIR}/PkgInfo"

          # Info.plist
          cat > "${APP_DIR}/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>English</string>
            <key>CFBundleExecutable</key>
            <string>SikuliX</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleIdentifier</key>
            <string>org.sikuli.ide</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>SikuliX</string>
            <key>CFBundleDisplayName</key>
            <string>SikuliX</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.utilities</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSHumanReadableCopyright</key>
            <string>Copyright © 2026 SikuliX Contributors. MIT License.</string>
          </dict>
          </plist>
          PLIST

      - name: Sign app bundle
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          codesign --sign - --force --deep SikuliX.app

      - name: Package DMG
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          readonly VERSION="${VERSION}"
          readonly DMG_NAME="SikuliX-${VERSION}.dmg"
          readonly TMP_DMG="/tmp/sikulix-rw.dmg"
          readonly MOUNT="/tmp/sikulix-mount"

          # Create a writable DMG large enough for the JAR (~200 MB)
          hdiutil create \
            -size 250m \
            -fs HFS+ \
            -volname "SikuliX" \
            "${TMP_DMG}"

          hdiutil attach "${TMP_DMG}" -mountpoint "${MOUNT}" -nobrowse -quiet
          cp -R "SikuliX.app" "${MOUNT}/"
          ln -s /Applications "${MOUNT}/Applications"
          hdiutil detach "${MOUNT}" -quiet

          # Convert to read-only compressed DMG
          hdiutil convert "${TMP_DMG}" \
            -format UDZO \
            -imagekey zlib-level=9 \
            -o "${DMG_NAME}"

          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"
          echo "SHA256=$(shasum -a 256 "${DMG_NAME}" | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Create release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly TAG="${{ steps.upstream.outputs.tag }}"
          readonly VERSION="${VERSION}"

          printf 'macOS DMG wrapping [oculix-org/SikuliX1@v%s](https://github.com/oculix-org/SikuliX1/releases/tag/v%s).\n\nBuilt from `sikulixide-%s-macos.jar` with a shell-script launcher pointing at Homebrew'"'"'s `openjdk@21`.\n' \
            "${VERSION}" "${VERSION}" "${VERSION}" > /tmp/sikulix-release-notes.md

          git tag "${TAG}"
          git push origin "${TAG}"

          gh release create "${TAG}" \
            "${DMG_NAME}" \
            --title "SikuliX ${VERSION}" \
            --notes-file /tmp/sikulix-release-notes.md

      - name: Update cask
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          readonly VERSION="${VERSION}"

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/sikulix.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/sikulix.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/sikulix.rb
          git commit -m "chore: update sikulix to ${VERSION}"
          git push
